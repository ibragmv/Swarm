run:
  timeout: 5m
  modules-download-mode: readonly

linters:
  enable:
    - errcheck
    - gosimple
    - govet
    - ineffassign
    - staticcheck
    - unused
    - gofmt
    - goimports
    - misspell
    - gocritic
    - bodyclose
    - noctx
    - exportloopref

linters-settings:
  gocritic:
    enabled-tags:
      - diagnostic
      - style
      - performance
  misspell:
    locale: US
  goimports:
    local-prefixes: github.com/Armur-Ai/autopentest

issues:
  exclude-use-default: false
  max-issues-per-linter: 0
  max-same-issues: 0
