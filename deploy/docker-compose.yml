version: "3.9"

services:
  pentestswarm:
    build:
      context: ../..
      dockerfile: deploy/docker/Dockerfile
    ports:
      - "8080:8080"
    environment:
      PENTESTSWARM_DATABASE_HOST: postgres
      PENTESTSWARM_DATABASE_PASSWORD: pentestswarm
      PENTESTSWARM_REDIS_HOST: redis
      PENTESTSWARM_ORCHESTRATOR_PROVIDER: ollama
      PENTESTSWARM_ORCHESTRATOR_ENDPOINT: http://ollama:11434
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: pentestswarm
      POSTGRES_PASSWORD: pentestswarm
      POSTGRES_DB: pentestswarm
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pentestswarm"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    deploy:
      resources:
        reservations:
          memory: 8G

volumes:
  pgdata:
  ollama_models:
